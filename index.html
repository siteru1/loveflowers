<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Flowers</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#fff;
color:#333;
}

/* ШАПКА */

header{
text-align:center;
padding:20px;
border-bottom:1px solid #eee;
background:white;
}

header img{
width:120px;
margin-bottom:10px;
}

header h1{
margin:0;
font-size:24px;
}

/* СІТКА ТОВАРІВ */

.container{
padding:20px;
}

.shop-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

/* КАРТКА */

.product-card{
background:#fafafa;
border-radius:10px;
padding:10px;
text-align:center;
transition:0.3s;
}

.product-card:hover{
transform:translateY(-5px);
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.product-card img{
width:100%;
border-radius:8px;
}

.product-card h3{
font-size:16px;
margin:10px 0 5px;
}

.price{
font-weight:bold;
margin-bottom:10px;
}

.buy{
background:#ff69b4;
border:none;
padding:8px 15px;
color:white;
border-radius:6px;
cursor:pointer;
}

/* МОБІЛЬНА ВЕРСІЯ */

@media (max-width:768px){

.shop-grid{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

<header>

<img src="logo.png">

<h1>Love Flowers</h1>

</header>


<div class="container">

<div class="shop-grid" id="shop"></div>

</div>


<script>

const API = "https://script.google.com/macros/s/AKfycbz3_DIgy6c_tMajpFwEHhPZ6p1vGO_rrl3fa_AJUZHjSfYHhGtFkKvT-DCKXkGxKbYB/exec";

async function load(){

const res = await fetch(API);
const data = await res.json();

const shop = document.getElementById("shop");

shop.innerHTML = data.map(p => {

const text = encodeURIComponent(
`Здравствуйте!
Хочу заказать букет:

${p['Назва']}
Цена: ${p['Ціна']} ₽`
);

return `

<div class="product-card">

<img src="${p['Фото URL']}">

<h3>${p['Назва']}</h3>

<div class="price">${p['Ціна']} ₽</div>

<a href="https://t.me/love_Flawers_menedger?text=${text}" target="_blank">

<button class="buy">Купить</button>

</a>

</div>

`;

}).join('');

}

load();

</script>

</body>
</html>
