<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Lovely Flowers</title>

<style>

body{
font-family:Arial;
background:#fff;
margin:0;
}

header{
background:#ffb6c1;
padding:20px;
text-align:center;
font-size:28px;
color:white;
}

.shop{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
}

.card{
background:#f7f7f7;
padding:15px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
font-size:18px;
font-weight:bold;
margin:10px 0;
}

button{
background:#ff69b4;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
Lovely Flowers
</header>

<div class="shop" id="shop"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwYk1mOCkxir7FKHU7gvnr5NtHc3bNLAHeH2Y7teqM-JTuJC61NA1qENGsizSVskTFG/exec";

async function load(){

const res = await fetch(API);
const data = await res.json();

const shop = document.getElementById("shop");

shop.innerHTML = data.map(p => `
<div class="card">

<img src="${p['Фото URL']}">

<h3>${p['Назва']}</h3>

<div class="price">${p['Ціна']} ₽</div>

<a href="https://t.me/love_Flawers_menedger">
<button>Купить</button>
</a>

</div>
`).join('');

}

load();

</script>

</body>
</html>
